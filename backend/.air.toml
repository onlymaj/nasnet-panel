root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./nasnet-panel"
  cmd = "go build -o ./nasnet-panel ./cmd/api"
  delay = 1000
  exclude_append = []
  exclude_dir = ["assets", "tmp", "vendor", "testdata"]
  exclude_extensions = ["so", "o", "a", "dll", "dylib"]
  exclude_file = []
  exclude_patterns = ["*.swp"]
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  full_bin = ""
  include_append = []
  include_dir = []
  include_extensions = ["go", "tpl", "tmpl", "html"]
  include_file = []
  include_regex = []
  kill_delay = "0s"
  log = "build-log.txt"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
