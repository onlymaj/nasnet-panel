version: "2"

run:
  timeout: 5m
  tests: true

issues:
  new-from-rev: origin/dev

linters:
  default: standard
  enable:
    - bodyclose
    - contextcheck
    - errname
    - errorlint
    - gochecknoinits
    - gocritic
    - godot
    - gosec
    - misspell
    - nakedret
    - nilerr
    - noctx
    - predeclared
    - revive
    - unconvert
    - unparam
    - whitespace
  settings:
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
        - name: early-return
        - name: unchecked-type-assertion
        - name: unused-receiver
        - name: confusing-naming
        - name: import-shadowing
        - name: modifies-value-receiver
        - name: waitgroup-by-value
        - name: string-of-int
        - name: useless-break
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
    godot:
      scope: declarations
      period: true
      capital: true
    nakedret:
      max-func-lines: 30
    gosec:
      excludes:
        - G104
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - unparam
          - revive

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - nasnet-panel
