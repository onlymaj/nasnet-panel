name: PR Check

on:
  pull_request:
    branches:
      - dev

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  up-to-date:
    name: Up-to-date with ${{ github.base_ref }}
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Compare PR head to ${{ github.base_ref }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEHIND=$(gh api "repos/${{ github.repository }}/compare/${{ github.event.pull_request.base.ref }}...${{ github.event.pull_request.head.sha }}" --jq '.behind_by')
          if [ "$BEHIND" -gt 0 ]; then
            echo "::error::Branch is $BEHIND commit(s) behind ${{ github.base_ref }}. Rebase or merge."
            exit 1
          fi
          echo "Branch is up-to-date."

  frontend:
    name: Frontend (lint · format · typecheck · build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: up-to-date
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-workspace
        with:
          node-version: '20'

      - name: Prettier (format:check)
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Webpack production build
        run: npm run build

  backend:
    name: Backend (fmt · vet · lint · build · test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: up-to-date
    steps:
      - uses: actions/checkout@v4

      - name: Fetch ${{ github.base_ref }} for lint diff
        run: git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }} --depth=50

      - uses: ./.github/actions/setup-go-backend

      - name: Install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Install nilaway
        run: go install go.uber.org/nilaway/cmd/nilaway@latest

      - name: Format check (gofmt + goimports)
        working-directory: backend
        run: golangci-lint fmt --diff

      - name: go vet
        working-directory: backend
        run: go vet ./...

      - name: golangci-lint
        working-directory: backend
        run: golangci-lint run --timeout=5m

      - name: nilaway
        working-directory: backend
        run: nilaway ./...

      - name: go build
        working-directory: backend
        run: go build ./...

      - name: go test
        working-directory: backend
        run: go test -vet=off ./...

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: up-to-date
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-workspace
        with:
          node-version: '20'

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  status:
    name: PR Status
    runs-on: ubuntu-latest
    needs: [up-to-date, frontend, backend, e2e]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "Up-to-date: ${{ needs.up-to-date.result }}"
          echo "Frontend:   ${{ needs.frontend.result }}"
          echo "Backend:    ${{ needs.backend.result }}"
          echo "E2E:        ${{ needs.e2e.result }}"
          if [[ "${{ needs.up-to-date.result }}" != "success" || "${{ needs.frontend.result }}" != "success" || "${{ needs.backend.result }}" != "success" || "${{ needs.e2e.result }}" != "success" ]]; then
            echo "::error::One or more checks failed"
            exit 1
          fi
          echo "All PR checks passed"
